<style>

function renHome(){const now=new Date(),dow=now.getDay(),hr=now.getHours();$('hday').textContent=DN[dow];$('hdt').textContent=now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});const ct=$('hc');if(dow===0){ct.innerHTML='<div style="margin-bottom:12px"><span style="font-family:Orbitron;font-size:9px;letter-spacing:2px;color:var(--tdim)">TUTTI I QUADERNI</span></div><div class="ng" id="nbg"></div>';renNG('nbg');return}const sc=SC[dow]||[];let h='';sc.forEach(l=>{const sh=parseInt(l.t);h+=`<div class="sci ${hr===sh?'now':''}" onclick="openNB('${l.m.replace(/'/g,"\\'")}')"><div class="sct"><div class="scn">${l.o}</div><div class="sch">${l.t}</div></div><div class="scb" style="background:${l.c}"></div><div class="scf"><div class="scs">${l.m}</div><div class="scp">${l.p}</div>${l.a?`<div class="scr">📍 ${l.a}</div>`:''}</div><div class="sca">›</div></div>`});h+='<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)"><span style="font-family:Orbitron;font-size:7px;letter-spacing:2px;color:var(--tdim)">TUTTI I QUADERNI</span></div><div class="ng" id="nbgm" style="margin-top:8px"></div>';ct.innerHTML=h;renNG('nbgm')}
function renNG(id){const g=$(id);if(!g)return;SB.forEach(s=>{const n=(nb[s.n]||[]).length;const d=document.createElement('div');d.className='nc';d.innerHTML=`<div class="nci" style="border-color:${s.c}40;background:${s.c}10">${s.i}</div><div class="nct" style="color:${s.c}">${s.n}</div><div class="ncm">${n} PAG</div>`;d.onclick=()=>openNB(s.n);g.appendChild(d)})}
function renPg(){const l=$('nlist');l.innerHTML='';if(stb==='n'){renNBL();return}if(!cNB||!nb[cNB]){l.innerHTML='<div style="padding:10px;text-align:center;color:var(--tdim);font-size:8px">Nessun quaderno</div>';return}nb[cNB].forEach(pg=>{const el=document.createElement('div');el.className='ni'+(pg.id===cPg?' active':'');el.innerHTML=`<div class="ni-t">${pg.title}</div><div class="ni-m">${fTs(pg.ts)}</div><button class="ni-d" onclick="delPg(${pg.id},event)">✕</button>`;el.addEventListener('click',()=>ldPg(pg.id));l.appendChild(el)})}
function renNBL(){const l=$('nlist');l.innerHTML='';SB.forEach(s=>{const n=(nb[s.n]||[]).length;const el=document.createElement('div');el.className='ni'+(cNB===s.n?' active':'');el.innerHTML=`<div class="ni-t" style="color:${s.c}">${s.i} ${s.n}</div><div class="ni-m">${n} PAG</div>`;el.addEventListener('click',()=>openNB(s.n));l.appendChild(el)})}

function addAM(t,ty){const ct=$('aim');const d=document.createElement('div');d.className='amsg '+ty;d.innerHTML=t;ct.appendChild(d);ct.scrollTop=ct.scrollHeight}
function aiR(msg){const m=msg.toLowerCase();if(m.includes('consiglio')||m.includes('studio'))return["📚 Pomodoro: 25min studio, 5min pausa.","🧠 Ripetizione spaziata: 1,3,7,14gg.","📝 Scrivi a mano: +30% memoria."][Math.floor(Math.random()*3)];if(m.includes('quiz')){if(m.includes('mat'))return"📐 Derivata x³+2x? → 3x²+2";if(m.includes('info'))return"💻 HTTP = HyperText Transfer Protocol";return"📝 Specifica materia!"}if(m.includes('formula'))return"🔢 Pitagora: a²+b²=c² | Eq 2°: x=(-b±√(b²-4ac))/2a";if(m.includes('orar')||m.includes('domani')||m.includes('oggi')){let d=(new Date).getDay();if(m.includes('domani'))d=(d+1)%7;const s=SC[d];if(!s)return`📅 ${DN[d]}: Nessuna lezione`;let h=`📅 <b>${DN[d]}:</b><br>`;s.forEach(l=>h+=`• ${l.o}° ${l.m} - ${l.p}<br>`);return h}return"🤔 Comandi: quiz, formula, consigli, orario"}
